<!DOCTYPE html>
<html>
<head>
    <title>Cat vs Dog Classifier</title>
</head>
<body>
    <h1>Upload Image</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <h2>Prediction: {{ result }}</h2>
        <img src="{{ image }}" width="300">
    {% endif %}
</body>
</html>
